<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Captcha Test</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f6f7fb;
        margin: 0;
        padding: 24px;
      }

      .card {
        max-width: 420px;
        margin: 40px auto;
        background: #fff;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      }

      h1 {
        margin-top: 0;
        font-size: 22px;
      }

      .captcha-box {
        margin: 12px 0;
        text-align: center;
      }

      .captcha-box img {
        border: 1px solid #d9dbe7;
        border-radius: 8px;
        max-width: 100%;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #d9dbe7;
        border-radius: 8px;
        padding: 10px;
        margin: 10px 0;
        font-size: 14px;
      }

      .actions {
        display: flex;
        gap: 8px;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 12px;
        cursor: pointer;
      }

      .btn-main {
        background: #2259ff;
        color: #fff;
      }

      .btn-secondary {
        background: #eef1ff;
        color: #1d2b6b;
      }

      #result {
        margin-top: 12px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Тест капчи</h1>

      <div class="captcha-box">
        <img id="captchaImage" alt="captcha" />
      </div>

      <input
        id="captchaInput"
        type="text"
        placeholder="Введите символы с картинки"
        autocomplete="off"
      />

      <div class="actions">
        <button class="btn-main" id="checkBtn">Проверить</button>
        <button class="btn-secondary" id="refreshBtn">Новая капча</button>
      </div>

      <div id="result"></div>
    </div>

    <script>
      let challengeId = "";

      async function loadCaptcha() {
        const resultNode = document.getElementById("result");
        resultNode.textContent = "";

        const res = await fetch("/captcha/new");
        const data = await res.json();
        challengeId = data.challenge_id;

        const img = document.getElementById("captchaImage");
        img.src = "data:image/png;base64," + data.image_base64;

        document.getElementById("captchaInput").value = "";
      }

      async function verifyCaptcha() {
        const value = document.getElementById("captchaInput").value;
        const resultNode = document.getElementById("result");

        const res = await fetch("/captcha/verify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            challenge_id: challengeId,
            value: value
          })
        });

        if (!res.ok) {
          resultNode.textContent = "error";
          resultNode.style.color = "#d7263d";
          return;
        }

        const data = await res.json();
        if (data.status === "success") {
          resultNode.textContent = "success";
          resultNode.style.color = "#1a7f37";
        } else {
          resultNode.textContent = "error";
          resultNode.style.color = "#d7263d";
        }
      }

      document.getElementById("checkBtn").addEventListener("click", verifyCaptcha);
      document.getElementById("refreshBtn").addEventListener("click", loadCaptcha);
      loadCaptcha();
    </script>
  </body>
</html>
