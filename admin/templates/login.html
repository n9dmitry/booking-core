<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Вход — Hotel Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/static/css/admin.css">
</head>
<body class="login-body">
<div class="login-card">
  <div class="login-logo">🏨</div>
  <h1 class="login-title">Hotel Admin</h1>
  <p class="login-sub">Введите данные для входа</p>
  {% if error %}
  <div class="alert alert-error">⚠️ {{ error }}</div>
  {% endif %}
  <form method="post" action="/admin/login">
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" placeholder="admin@hotel.ru" required autofocus autocomplete="email">
    </div>
    <div class="form-group">
      <label>Пароль</label>
      <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn btn-primary btn-full">Войти →</button>
  </form>
</div>
</body>
</html>
