<!DOCTYPE html>
<html lang="ru" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Донбасс Букинг — Админ{% endblock %}</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Vue -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

  <!-- Axios -->
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  {% block extra_head %}{% endblock %}
</head>

<body class="bg-light">

<div class="d-flex vh-100">

  <!-- Боковая панель -->
  <div class="bg-dark text-white" style="width: 280px;">
    <div class="p-4 border-bottom border-secondary">
      <h3 class="mb-0 fw-bold">Донбасс Букинг</h3>
    </div>
    <nav class="nav flex-column p-3">
      <a href="/" class="nav-link text-white py-3 px-4 rounded {% if request.url.path == '/' %}bg-primary active{% else %}hover-bg-secondary{% endif %}">
        <i class="fas fa-chart-line me-3"></i> Дашборд
      </a>
      <a href="/hotels" class="nav-link text-white py-3 px-4 rounded {% if request.url.path == '/hotels' %}bg-primary active{% else %}hover-bg-secondary{% endif %}">
        <i class="fas fa-hotel me-3"></i> Отели
      </a>
      <a href="#" class="nav-link text-white py-3 px-4 rounded hover-bg-secondary">
        <i class="fas fa-bed me-3"></i> Номера
      </a>
      <a href="#" class="nav-link text-white py-3 px-4 rounded hover-bg-secondary">
        <i class="fas fa-calendar-check me-3"></i> Бронирования
      </a>
    </nav>
  </div>

  <!-- Контент -->
  <main class="flex-grow-1 p-5 overflow-auto">
    {% block content %}{% endblock %}
  </main>





</div>

{% block extra_scripts %}{% endblock %}
</body>
</html>
